name: Block PR whose base is not the default

on:
  pull_request_target:
    types: [opened, edited, ready_for_review, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  check-base-branch:
    name: Check base branch of PR
    runs-on: ubuntu-latest
    steps:
      - id: verify_pr_base_branch
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "error_message=Opening a pull request to '${{ github.event.pull_request.base.ref }}', which is not '${{ github.event.repository.default_branch }}', is prohibited." >> $GITHUB_OUTPUT
            exit 1
          fi
      - uses: marocchino/sticky-pull-request-comment@v3
        if: always() && (steps.verify_pr_base_branch.outputs.error_message != null)
        with:
          header: pr-base-branch-error
          message: |
            感谢你对 OI Wiki 的关注！ 👋🏼

            我们不接受向 `${{ github.event.repository.default_branch }}` 以外的分支发起的 PR，您可以查阅 [GitHub 官方文档](https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/proposing-changes-to-your-work-with-pull-requests/changing-the-base-branch-of-a-pull-request) 了解如何更改基本分支。

            错误信息:

            ```
            ${{ steps.verify_pr_base_branch.outputs.error_message }}
            ```
      - uses: marocchino/sticky-pull-request-comment@v3
        if: ${{ steps.verify_pr_base_branch.outputs.error_message == null }}
        with:
          header: pr-base-branch-error
          delete: true
